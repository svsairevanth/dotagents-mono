commands:
  install: pnpm install
  build: pnpm build
  build:shared: pnpm --filter @dotagents/shared build
  build:core: pnpm --filter @dotagents/core build
  build:desktop: pnpm --filter @dotagents/desktop build
  build:cli: pnpm --filter @dotagents/cli build
  typecheck: pnpm typecheck
  test: pnpm -r test
  test:shared: pnpm --filter @dotagents/shared exec vitest run
  test:core: pnpm --filter @dotagents/core exec vitest run
  test:desktop: pnpm --filter @dotagents/desktop exec vitest run
  test:mobile: pnpm --filter @dotagents/mobile test
  test:cli: pnpm --filter @dotagents/cli exec vitest run
  lint: pnpm lint

services:
  desktop:
    start: REMOTE_DEBUGGING_PORT=9222 pnpm dev
    stop: lsof -ti :3210 | xargs kill 2>/dev/null; lsof -ti :9222 | xargs kill 2>/dev/null
    healthcheck: curl -sf http://localhost:3210/health || lsof -i :9222 -P -n | grep LISTEN
    port: 3210
    depends_on: []
