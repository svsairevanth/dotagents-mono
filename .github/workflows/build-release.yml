name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version or tag to publish (defaults to apps/desktop/package.json version)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      release_name: ${{ steps.resolve.outputs.release_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            tag="${{ inputs.version }}"
          else
            tag="v$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' apps/desktop/package.json | head -n 1)"
          fi

          if [[ "$tag" != v* ]]; then
            tag="v$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=DotAgents $tag" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3-dev \
            libxss-dev \
            libxtst-dev \
            libatspi2.0-dev \
            libasound2-dev \
            libsecret-1-dev \
            libx11-dev \
            libxi-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            fakeroot

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @dotagents/shared build

      - name: Build Linux packages
        working-directory: apps/desktop
        run: pnpm run build:linux:release:${{ matrix.arch }}

      - name: Smoke-check Linux release
        run: bash scripts/smoke-check-linux-release.sh --arch ${{ matrix.arch }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: |
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.AppImage

  build-windows:
    needs: resolve-release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @dotagents/shared build

      - name: Build Windows packages
        working-directory: apps/desktop
        run: pnpm run build:win:skip-types

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            apps/desktop/dist/*-setup.exe
            apps/desktop/dist/*-portable.exe

  build-macos:
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-13
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @dotagents/shared build

      - name: Build macOS artifacts
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          pnpm run build-rs
          npx electron-vite build
          npx electron-builder --mac dmg zip --${{ matrix.arch }} --config electron-builder.config.cjs --publish=never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: |
            apps/desktop/dist/*-${{ matrix.arch }}.dmg
            apps/desktop/dist/*-${{ matrix.arch }}.dmg.blockmap
            apps/desktop/dist/*-${{ matrix.arch }}.zip
            apps/desktop/dist/*-${{ matrix.arch }}.zip.blockmap

  publish-release:
    needs:
      - resolve-release
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          name: ${{ needs.resolve-release.outputs.release_name }}
          files: |
            release-assets/**
          fail_on_unmatched_files: true

